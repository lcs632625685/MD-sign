name: 美的家居自动签到

on:
  schedule:
    # 每天北京时间 8:00 执行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  sign:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v3
    
    - name: 设置 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: 安装依赖
      run: |
        pip install requests
    
    - name: 执行签到
      env:
        MIDEA_USERNAME: ${{ secrets.MIDEA_USERNAME }}
        MIDEA_PASSWORD: ${{ secrets.MIDEA_PASSWORD }}
        SERVER_CHAN_KEY: ${{ secrets.SERVER_CHAN_KEY }}
      run: |
        python midea_sign.py
